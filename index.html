<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Dig Pro — Scorepad</title>
<meta name="theme-color" content="#1b4d3e" />
<meta name="description" content="Dig Pro — a scorepad for your Gin card-game nights: live scoring, leagues, leaderboards and cloud sync." />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Dig Pro" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --felt:#1b4d3e; --felt-deep:#123a2e;
    --card:#f4eddd; --card-edge:#e3d8bf; --card-lead:#f8edd0;
    --ink:#17120c; --red:#b81d24; --brass:#c99a3b; --brass-soft:#e7c878;
    --line:rgba(244,237,221,.14);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Inter",system-ui,sans-serif;color:var(--card);
    background:radial-gradient(120% 90% at 50% -10%, #245c4a 0%, var(--felt) 42%, var(--felt-deep) 100%);
    min-height:100vh;-webkit-font-smoothing:antialiased;
    padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 24px);
  }
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:radial-gradient(rgba(0,0,0,.18) 1px,transparent 1px);background-size:4px 4px;opacity:.35;mix-blend-mode:multiply}
  .wrap{position:relative;z-index:1;max-width:920px;margin:0 auto;padding:0 16px}

  header{padding:24px 0 12px;text-align:center}
  .kicker{font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--brass-soft);font-weight:600}
  h1{font-family:"Fraunces",serif;font-weight:900;font-size:clamp(34px,8vw,56px);line-height:.95;margin:6px 0 2px;letter-spacing:-.01em}
  h1 .suits{font-weight:400;font-size:.6em;vertical-align:middle;margin-left:.18em}
  h1 .s-r{color:var(--red)} h1 .s-b{color:var(--card)}
  .tag{font-size:12.5px;color:rgba(244,237,221,.6)}

  nav{display:flex;gap:6px;justify-content:center;margin:18px auto 22px;background:rgba(0,0,0,.22);padding:5px;border-radius:999px;width:fit-content;border:1px solid var(--line)}
  nav button{font-weight:600;font-size:13.5px;color:rgba(244,237,221,.7);background:none;border:none;padding:9px 15px;border-radius:999px;cursor:pointer;transition:.18s;white-space:nowrap}
  nav button:hover{color:var(--card)}
  nav button.on{background:var(--card);color:var(--felt-deep)}

  .leaguebar{display:flex;align-items:center;gap:8px;justify-content:center;flex-wrap:wrap;margin:0 auto 20px}
  .lglabel{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(244,237,221,.45);font-weight:600}
  .leaguebar select{background:rgba(0,0,0,.25);color:var(--card);border:1px solid var(--line);border-radius:9px;padding:8px 12px;font-size:13.5px;font-weight:600;font-family:"Inter";cursor:pointer;max-width:200px}
  .leaguebar select:focus{outline:2px solid var(--brass)}
  .lgman{background:none;border:1px solid var(--line);color:rgba(244,237,221,.6);border-radius:8px;padding:7px 11px;font-size:11.5px;font-weight:600;cursor:pointer;font-family:"Inter";transition:.15s}
  .lgman:hover{border-color:var(--brass);color:var(--brass-soft)}
  .lgman.new{border-color:rgba(201,154,59,.55);color:var(--brass-soft)}
  .lgman.new:hover{background:rgba(201,154,59,.14)}
  .startleague{width:100%;margin-top:12px;border-color:rgba(201,154,59,.45)!important;color:var(--brass-soft)!important}
  .setup-league{margin-top:18px;border-top:1px solid var(--line);padding-top:14px}
  .setup-league .filing{margin:0 0 4px}
  .lgcta{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 8px}
  .lgcta .startleague{flex:1 1 42%;width:auto;margin-top:0;font-size:13.5px;padding:11px 8px}
  .dimnote{color:rgba(244,237,221,.4);font-size:12px}
  .watchcta{margin-top:8px}
  .livebar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:12px}
  .livebar .livebtn{flex:0 1 auto;margin-top:0;font-size:13px;padding:9px 12px}
  .livebar .livebtn.full{flex:1 1 100%}
  .liveon{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:#f0c36b;background:rgba(201,154,59,.14);border:1px solid rgba(201,154,59,.4);border-radius:999px;padding:7px 13px}
  .liveon b{font-family:"Fraunces";letter-spacing:.08em;color:var(--brass-soft)}
  .vcount{font-size:12px;font-weight:600;color:rgba(244,237,221,.65);white-space:nowrap}
  .dot{width:9px;height:9px;border-radius:50%;background:#e0524b;box-shadow:0 0 0 0 rgba(224,82,75,.6);animation:pulse 1.6s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(224,82,75,.55)}70%{box-shadow:0 0 0 8px rgba(224,82,75,0)}100%{box-shadow:0 0 0 0 rgba(224,82,75,0)}}
  .livebanner{display:flex;align-items:center;justify-content:center;gap:8px;font-size:13.5px;font-weight:700;letter-spacing:.02em;padding:10px;border-radius:12px;margin-bottom:14px}
  .livebanner.on{color:#f3d089;background:rgba(224,82,75,.12);border:1px solid rgba(224,82,75,.4)}
  .livebanner.off{color:rgba(244,237,221,.6);background:rgba(0,0,0,.2);border:1px solid var(--line)}
  .livebanner b{font-family:"Fraunces";letter-spacing:.1em;color:var(--brass-soft)}
  .cellview{min-height:34px;display:flex;align-items:center;justify-content:center;gap:5px;font-family:"Fraunces";font-size:18px;font-weight:600;color:var(--ink)}
  .cell.ginon .cellview{color:var(--red)}
  .ginmark{font-family:"Inter";font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;background:var(--red);color:#fff;border-radius:4px;padding:1px 4px}
  .histsearch{margin-bottom:14px}
  .histsearch input{width:100%;background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:10px;padding:11px 14px;font-size:15px;color:var(--card);font-family:"Inter"}
  .histsearch input:focus{outline:2px solid var(--brass)}
  .histsearch input::placeholder{color:rgba(244,237,221,.4)}
  .statshd{font-family:"Fraunces";font-weight:600;font-size:16px;color:var(--brass-soft);margin:18px 0 8px}
  .statstbl th,.statstbl td{padding:7px 6px;font-size:13px}
  .statstbl .wins{font-size:15px}
  .h2hbox{display:flex;flex-direction:column;gap:6px}
  .h2hrow{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;background:rgba(0,0,0,.18);border:1px solid var(--line);border-radius:10px;padding:9px 12px}
  .h2hp{font-size:13.5px;font-weight:600;color:rgba(244,237,221,.75)}
  .h2hp.r{text-align:right}
  .h2hp.win{color:var(--card)}
  .h2hscore{font-family:"Fraunces";font-weight:700;font-size:16px;color:var(--card);white-space:nowrap;text-align:center}
  .h2hscore .dash{color:rgba(244,237,221,.4);margin:0 2px}
  .h2hscore .drw{font-family:"Inter";font-size:10px;font-weight:600;color:rgba(244,237,221,.4)}
  .confetti{position:fixed;inset:0;pointer-events:none;z-index:90;overflow:hidden}
  .confetti i{position:absolute;top:-12px;width:9px;height:14px;border-radius:2px;opacity:.95;animation:fall linear forwards}
  @keyframes fall{0%{transform:translateY(-10px) rotate(0deg)}100%{transform:translateY(108vh) rotate(540deg)}}
  @media (prefers-reduced-motion: reduce){.confetti{display:none}}
  .lgtag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--brass-soft);background:rgba(201,154,59,.14);border:1px solid rgba(201,154,59,.3);border-radius:6px;padding:2px 7px;margin-left:8px;vertical-align:middle}
  .filing{margin-top:14px;font-size:12.5px;color:rgba(244,237,221,.5);text-align:center}
  .filing b{color:var(--brass-soft);font-weight:600}
  .saved{margin-top:16px}
  .savedlbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(244,237,221,.45);font-weight:600;margin-bottom:8px}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{display:inline-flex;align-items:center;background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:999px;overflow:hidden}
  .chip .chipname{background:none;border:none;color:var(--card);font-size:13px;font-weight:600;padding:7px 6px 7px 13px;cursor:pointer;font-family:"Inter"}
  .chip .chipname:hover{color:var(--brass-soft)}
  .chip .chipx{background:none;border:none;color:rgba(244,237,221,.35);font-size:15px;cursor:pointer;padding:0 10px 0 4px}
  .chip .chipx:hover{color:var(--red)}
  .lgcode{font-size:11px;color:rgba(244,237,221,.5);letter-spacing:.02em;white-space:nowrap}
  .lgcode b{color:var(--brass-soft);font-family:"Fraunces";letter-spacing:.1em;font-size:13px}
  .auth .authtitle{font-family:"Fraunces";font-weight:600;font-size:25px;margin-bottom:16px;text-align:center}
  .authseg{display:flex;margin-bottom:14px}
  .authseg button{flex:1;text-align:center;padding:10px 0}
  .authfields{display:flex;flex-direction:column;gap:10px;margin:14px 0}
  .authfields input{background:rgba(244,237,221,.95);border:none;border-radius:9px;padding:13px 14px;font-size:16px;color:var(--ink);font-weight:500;font-family:"Inter"}
  .authfields input:focus{outline:2px solid var(--brass)}
  .authdiv{display:flex;align-items:center;gap:10px;color:rgba(244,237,221,.35);font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin:18px 0 12px}
  .authdiv::before,.authdiv::after{content:"";flex:1;height:1px;background:var(--line)}
  .authalt{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-top:2px}
  .authalt .rulelink{flex:0 1 auto}
  .auth{position:relative}
  .authclose{position:absolute;top:14px;right:14px;background:rgba(0,0,0,.2);border:1px solid var(--line);color:rgba(244,237,221,.7);width:32px;height:32px;border-radius:50%;font-size:14px;cursor:pointer;line-height:1;transition:.15s}
  .authclose:hover{color:var(--card);border-color:var(--brass)}
  .rulelink{background:none;border:none;color:var(--brass-soft);font-size:12px;font-weight:600;cursor:pointer;text-decoration:underline;text-underline-offset:2px;padding:0 2px;font-family:"Inter"}
  .rules .ruleshead{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
  .rules .ruleshead h2{margin:0}
  .rules .ruleshead .btn{padding:9px 18px}
  .rrow{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
  .rrow label{font-size:14px;color:rgba(244,237,221,.85);font-weight:500}
  .rrow.sub2{padding:9px 0 9px 14px}
  .rrow.sub2 label{font-size:13px;color:rgba(244,237,221,.6);font-weight:400}
  .rsec{margin:4px 0;padding:2px 0}
  .rnum{width:84px;background:rgba(244,237,221,.95);border:none;border-radius:8px;padding:9px 10px;font-size:15px;font-weight:600;color:var(--ink);text-align:center;font-family:"Fraunces";font-variant-numeric:tabular-nums}
  .rnum:focus{outline:2px solid var(--brass)}
  .seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;flex:0 0 auto}
  .seg button{background:rgba(0,0,0,.2);border:none;color:rgba(244,237,221,.6);font-size:12.5px;font-weight:600;padding:8px 14px;cursor:pointer;font-family:"Inter";transition:.12s}
  .seg button.on{background:var(--brass);color:var(--felt-deep)}
  .rnote{font-size:11.5px;color:rgba(244,237,221,.5);padding:8px 0 2px;line-height:1.45}
  .mtbl tr.mrow td{color:#cdb27a}

  /* ---------- live scorepad ---------- */
  .roundlbl{text-align:center;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:rgba(244,237,221,.65);margin-bottom:6px}
  .roundlbl b{color:var(--brass-soft);font-weight:700}
  .helpline{text-align:center;font-size:11.5px;color:rgba(244,237,221,.5);margin:0 auto 14px;line-height:1.45;max-width:420px}
  .helpline b{color:var(--brass-soft);font-weight:600}
  .sheet{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
  .stbl{border-collapse:separate;border-spacing:6px 0;width:100%;min-width:300px}
  .gut{width:26px;min-width:26px;text-align:center;color:rgba(244,237,221,.5);font-family:"Fraunces";font-weight:600;font-size:13px;position:sticky;left:0;background:transparent;z-index:2}
  thead .gut{vertical-align:bottom;padding-bottom:8px;font-size:10px;letter-spacing:.1em;color:rgba(244,237,221,.4)}

  .pcol{background:var(--card);border-radius:12px 12px 0 0;padding:11px 6px 9px;vertical-align:bottom;text-align:center;position:relative;animation:deal .4s cubic-bezier(.2,.8,.25,1) backwards}
  .pcol:nth-child(3){animation-delay:.05s} .pcol:nth-child(4){animation-delay:.1s} .pcol:nth-child(5){animation-delay:.15s}
  @keyframes deal{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .pcol .su{font-size:16px;line-height:1}
  .pcol .nm{font-weight:700;font-size:12.5px;color:#4a3d2c;margin:3px 0 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pcol .tot{font-family:"Fraunces";font-weight:900;font-size:clamp(26px,7vw,34px);line-height:1;color:var(--ink);font-variant-numeric:tabular-nums}
  .pcol .tot.bump{animation:bump .35s ease}
  @keyframes bump{0%{transform:scale(1)}40%{transform:scale(1.16);color:var(--red)}100%{transform:scale(1)}}
  .pcol .pen{font-family:"Inter";font-weight:700;font-size:11px;color:var(--red);letter-spacing:.03em;min-height:13px;margin-top:1px}
  .pcol.lead{background:var(--card-lead);box-shadow:inset 0 3px 0 var(--brass)}
  .pcol .crown{position:absolute;top:-9px;left:50%;transform:translateX(-50%);font-size:13px;opacity:0;transition:.2s}
  .pcol.lead .crown{opacity:1}

  td.cell{background:var(--card);padding:0;text-align:center;vertical-align:top}
  td.cell.lead{background:var(--card-lead)}
  tbody tr:last-child td.cell{border-radius:0 0 12px 12px}
  td.cell.ginon{box-shadow:inset 0 -3px 0 var(--brass)}
  .ci{width:100%;height:36px;border:none;background:none;text-align:center;font-family:"Fraunces";font-weight:600;font-size:16px;color:var(--ink);font-variant-numeric:tabular-nums;border-bottom:1px solid rgba(0,0,0,.07)}
  .ci:focus{outline:none;background:rgba(201,154,59,.16)}
  .ci::placeholder{color:rgba(0,0,0,.16);font-weight:400}
  .ci::-webkit-outer-spin-button,.ci::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .cellctl{display:flex;align-items:stretch}
  .signbtn{flex:0 0 36%;border:none;background:none;cursor:pointer;font-family:"Inter";font-weight:700;font-size:13px;color:rgba(0,0,0,.26);padding:3px 0 6px;line-height:1;border-right:1px solid rgba(0,0,0,.06);transition:.12s}
  .signbtn:hover{color:var(--red)}
  .signbtn.neg{color:var(--red)}
  .ginbtn{flex:1;border:none;background:none;cursor:pointer;font-family:"Inter";font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(0,0,0,.2);padding:3px 0 6px;transition:.12s;line-height:1}
  .ginbtn:hover{color:var(--red)}
  .ginbtn.on{color:var(--brass)}
  .ginbtn.trig{color:var(--felt-deep)}
  .ginbtn.trig::after{content:" ✦"}

  .bar{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;justify-content:center}
  .btn{font-weight:600;font-size:14px;border-radius:10px;padding:12px 20px;cursor:pointer;border:1px solid var(--line);transition:.16s}
  .btn-primary{background:var(--brass);color:var(--felt-deep);border-color:var(--brass)}
  .btn-primary:hover{background:var(--brass-soft)}
  .btn-primary.ready{animation:glow 1.6s ease-in-out infinite}
  @keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(201,154,59,.5)}50%{box-shadow:0 0 0 7px rgba(201,154,59,0)}}
  .btn-ghost{background:rgba(0,0,0,.18);color:var(--card)}
  .btn-ghost:hover{background:rgba(0,0,0,.3)}
  .btn-danger{background:var(--red);color:#fff;border-color:var(--red)}
  .btn-danger:hover{background:#9d1820}
  .modal{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(8,22,17,.62);animation:fade .15s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .mcard{background:var(--felt);border:1px solid var(--line);border-radius:16px;padding:22px;max-width:340px;width:100%;box-shadow:0 22px 55px rgba(0,0,0,.55);animation:deal .22s cubic-bezier(.2,.8,.25,1)}
  .mcard h3{font-family:"Fraunces";font-weight:600;font-size:21px;margin-bottom:8px}
  .mcard p{font-size:14px;color:rgba(244,237,221,.72);line-height:1.5;margin-bottom:18px}
  .mbtns{display:flex;gap:10px}
  .mbtns .btn{flex:1}
  .importbox{background:rgba(201,154,59,.1);border:1px solid rgba(201,154,59,.4);border-radius:12px;padding:14px;margin:4px 0 6px}
  #toast{position:fixed;left:50%;bottom:calc(22px + env(safe-area-inset-bottom));transform:translate(-50%,16px);background:#0e2c22;color:var(--card);border:1px solid var(--line);border-radius:999px;padding:11px 20px;font-size:14px;font-weight:600;box-shadow:0 12px 32px rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:.25s;z-index:80;max-width:88vw;text-align:center}
  #toast.show{opacity:1;transform:translate(-50%,0)}
  .offline-pill{font-size:11px;font-weight:700;letter-spacing:.04em;color:#f0c36b;background:rgba(201,154,59,.16);border:1px solid rgba(201,154,59,.4);border-radius:999px;padding:3px 9px}
  .sharebtn{background:rgba(0,0,0,.18);border:1px solid var(--line);color:var(--brass-soft);border-radius:8px;font-size:13px;font-weight:600;padding:4px 9px;cursor:pointer;font-family:"Inter"}
  .sharebtn:hover{color:var(--card);border-color:var(--brass)}
  .sharebtn.wide{padding:8px 14px;font-size:13.5px}
  .when .sharebtn{margin-left:8px;padding:2px 8px;font-size:14px;line-height:1}
  .lbtools{display:flex;justify-content:flex-end;margin-bottom:12px}
  .datatools{margin-top:18px;border-top:1px solid var(--line);padding-top:16px}
  .dtlabel{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(244,237,221,.45);font-weight:600;margin-bottom:10px}
  .dtrow{display:flex;gap:10px;margin-bottom:10px}
  .btn.dt{flex:1;font-size:13.5px;padding:11px 10px}
  .btn.dt.full{width:100%}
  header,.footer{padding-left:max(18px,env(safe-area-inset-left));padding-right:max(18px,env(safe-area-inset-right))}
  .footer{padding-bottom:max(14px,env(safe-area-inset-bottom))}

  .pensum{margin-top:14px;text-align:center;font-size:12.5px;color:rgba(244,237,221,.7);line-height:1.6}
  .pensum .ev b{color:var(--brass-soft);font-weight:600} .pensum .ev .v{color:#f0a6a0;font-weight:600}

  /* ---------- setup ---------- */
  .panel{background:rgba(0,0,0,.2);border:1px solid var(--line);border-radius:16px;padding:22px}
  .panel h2{font-family:"Fraunces";font-weight:600;font-size:22px;margin-bottom:4px}
  .panel p.sub{color:rgba(244,237,221,.6);font-size:13.5px;margin-bottom:18px}
  .panel p.sub .note{display:block;margin-top:6px;color:rgba(244,237,221,.45);font-size:12px}
  .seat{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .seat .ord{font-family:"Fraunces";font-weight:600;color:rgba(244,237,221,.4);font-size:13px;width:16px;text-align:center}
  .seat .suit{font-size:22px;width:28px;text-align:center;cursor:pointer;user-select:none;transition:.12s}
  .seat .suit:hover{transform:scale(1.2)}
  .seat input{flex:1;background:rgba(244,237,221,.95);border:none;border-radius:9px;padding:12px 14px;font-size:15px;color:var(--ink);font-weight:500}
  .seat input:focus{outline:2px solid var(--brass)}
  .seat .rm{background:none;border:none;color:rgba(244,237,221,.45);font-size:20px;cursor:pointer;padding:0 4px}
  .seat .rm:hover{color:var(--red)}

<script>

let user=null, savedPlayers=[], authMode="in", recoveryMode=false, importable=0, pendingConfirmEmail="";
function cloudOn(){ return !!(sb && user); }
const K_ACTIVE="gin:active", K_HIST="gin:history", K_ROSTER="gin:roster", K_LEAGUES="gin:leagues", K_RULES="gin:rules", K_PLAYERS="gin:players";
const DEFAULT_RULES={rounds:10, winHigh:true, ginEnabled:true, ginStreak:3, ginFirst:100, ginStack:true, ginStepSmall:50, ginStepBig:100, bottomTitles:true, milestoneEnabled:true, milestoneThreshold:1000, milestonePenalty:100};

/* Storage backend: use Claude's artifact storage when present (inside Claude),
   otherwise fall back to the browser's localStorage (when self-hosted, e.g. Vercel).
   Shared (cross-user) scope only truly syncs under artifact storage. */
const _ls = (()=>{ try{ localStorage.setItem("__gin_t","1"); localStorage.removeItem("__gin_t"); return localStorage; }catch(e){ return null; } })();
function _useArtifact(){ return typeof window!=="undefined" && window.storage && window.storage.get; }
async function _bGet(key,shared){
  if(_useArtifact()){ const r = shared ? await window.storage.get(key,true) : await window.storage.get(key); return r?r.value:null; }
  if(_ls) return _ls.getItem(key);
  return null;
}
async function _bSet(key,value,shared){
  if(_useArtifact()){ if(shared) await window.storage.set(key,value,true); else await window.storage.set(key,value); return; }
  if(_ls){ _ls.setItem(key,value); return; }
  throw new Error("no storage");
}
async function _bDel(key,shared){
  if(_useArtifact()){ if(shared) await window.storage.delete(key,true); else await window.storage.delete(key); return; }
  if(_ls){ _ls.removeItem(key); return; }
}

/* Resilient persistence: state always lives in memory; saving is best-effort,
   debounced and retried, and never throws a visible error. */
const _timers={};
function _status(s){const el=document.getElementById("saveStatus"); if(!el)return; el.dataset.s=s;
  el.textContent = s==="saving" ? "Saving…" : s==="ok" ? "Saved on this device" : "Not saving — keep this tab open to avoid losing scores";}
async function _write(key,attempt=0){
  const obj = key===K_ACTIVE ? active : key===K_HIST ? history : key===K_ROSTER ? roster : key===K_LEAGUES ? leagueState : key===K_RULES ? rules : key===K_PLAYERS ? savedPlayers : undefined;
  try{
    if(obj===null || obj===undefined) await _bDel(key);
    else await _bSet(key, JSON.stringify(obj));
    _status("ok");
  }catch(e){
    if(attempt<2){ setTimeout(()=>_write(key,attempt+1), 250*(attempt+1)); return; }
    _status("off");
  }
}
function saveKey(key){ _status("saving"); clearTimeout(_timers[key]); _timers[key]=setTimeout(()=>_write(key),300); }
function saveNow(key){ clearTimeout(_timers[key]); return _write(key); }
function cancelSave(key){ clearTimeout(_timers[key]); }
async function loadKey(k){ try{ const v=await _bGet(k); return v?JSON.parse(v):null; }catch(e){ return null; } }
async function delKey(k){ cancelSave(k); try{ await _bDel(k); }catch(e){} }

/* ======================= CLOUD (Supabase) =======================
   When signed in, the user's rules, saved players, leagues and finished
   games live in Supabase. League games are visible to fellow league members
   (enforced by the database). Signed out, everything stays local. */
async function cloudInit(){
  if(!sb) return;
  try{
    const {data}=await sb.auth.getSession(); user=data.session?.user||null;
    sb.auth.onAuthStateChange(async (evt,session)=>{
      const before=user&&user.id; user=session?.user||null;
      if(evt==="PASSWORD_RECOVERY"){ recoveryMode=true; view="account"; }
      if((user&&user.id)!==before){ if(user){ await loadCloud(); } else { await loadLocal(); } }
      updateAccountBar(); if(view==="account") render();
    });
    if(user) await loadCloud();
  }catch(e){ console.warn("cloud init", e); }
}
async function loadCloud(){
  if(!cloudOn()) return;
  try{
    const [r,pl,lg,gm] = await Promise.all([
      sb.from("rules").select("data").eq("user_id",user.id).maybeSingle(),
      sb.from("players").select("*").eq("owner",user.id).order("created_at"),
      sb.from("leagues").select("*"),
      sb.from("games").select("*").order("played_at",{ascending:false})
    ]);
    if(r.data&&r.data.data){ rules=Object.assign({},DEFAULT_RULES,r.data.data); ROUNDS=rules.rounds; }
    else { await sb.from("rules").upsert({user_id:user.id, data:rules}); }   // seed cloud with current rules
    savedPlayers=(pl.data||[]).map(x=>({id:x.id,name:x.name,suit:x.suit||0}));
    leagueState.leagues=(lg.data||[]).map(l=>({id:l.id,name:l.name,code:l.join_code,owner:l.owner}));
    if(leagueState.current!=="all" && !leagueState.leagues.some(l=>l.id===leagueState.current)) leagueState.current="all";
    history=(gm.data||[]).map(g=>Object.assign({},g.data,{id:g.id,leagueId:g.league_id,_owner:g.owner}));
    history.forEach(g=>g.players&&g.players.forEach(p=>addToRoster(p.name)));
  }catch(e){ console.warn("cloud load", e); }
  await computeImportable();
  updateAccountBar(); render();
}
async function computeImportable(){
  importable=0;
  try{
    if(localStorage.getItem("gin:imported")==="1") return;
    const lh=(await loadKey(K_HIST))||[];
    importable = lh.filter(g=>g && typeof g.id==="string" && g.id.indexOf("g_")===0).length;
  }catch(e){ importable=0; }
}
async function importLocalToCloud(){
  if(!cloudOn()) return 0;
  const lh=(await loadKey(K_HIST))||[];
  const localLeagues=((await loadKey(K_LEAGUES))||{}).leagues||[];
  const toImport=lh.filter(g=>g && typeof g.id==="string" && g.id.indexOf("g_")===0);
  const map={};
  for(const g of toImport){
    if(g.leagueId && !(g.leagueId in map)){
      const ll=localLeagues.find(l=>l.id===g.leagueId);
      if(ll){ const row=await cloudCreateLeague(ll.name, genJoinCode());
        if(row){ map[g.leagueId]=row.id; if(!leagueState.leagues.some(l=>l.id===row.id)) leagueState.leagues.push({id:row.id,name:row.name,code:row.join_code,owner:row.owner}); }
        else map[g.leagueId]=null;
      } else map[g.leagueId]=null;
    }
  }
  let n=0;
  for(const g of toImport){
    const rec={players:g.players,winners:g.winners,rounds:g.rounds,date:g.date,leagueId:g.leagueId?map[g.leagueId]:null};
    const saved=await cloudSaveGame(rec); if(saved&&saved.id) n++;
  }
  try{ localStorage.setItem("gin:imported","1"); }catch(_){}
  importable=0;
  await loadCloud();
  return n;
}
async function loadLocal(){   // when a user signs out, fall back to this device's data
  history=(await loadKey(K_HIST))||[];
  const ls=await loadKey(K_LEAGUES); leagueState = (ls&&ls.leagues)?ls:{leagues:[],current:"all"};
  savedPlayers=(await loadKey(K_PLAYERS))||[];
  rules=Object.assign({},DEFAULT_RULES, await loadKey(K_RULES)||{}); ROUNDS=rules.rounds;
  updateAccountBar(); render();
}
/* cloud writers (no-ops when signed out) */
async function cloudSaveRules(){ if(!cloudOn())return; try{ await sb.from("rules").upsert({user_id:user.id,data:rules,updated_at:new Date().toISOString()}); }catch(e){console.warn(e);} }
async function cloudSaveGame(rec){ if(!cloudOn())return rec; try{
  const {data,error}=await sb.from("games").insert({owner:user.id, league_id: rec.leagueId||null,
    data:{players:rec.players,winners:rec.winners,rounds:rec.rounds,date:rec.date}}).select("id").single();
  if(!error&&data) rec.id=data.id;
}catch(e){console.warn(e);} return rec; }
async function cloudAddPlayer(p){ if(!cloudOn())return; try{ const {data}=await sb.from("players").insert({owner:user.id,name:p.name,suit:p.suit||0}).select("id").single(); if(data)p.id=data.id; }catch(e){console.warn(e);} }
async function cloudDelPlayer(id){ if(!cloudOn()||!id)return; try{ await sb.from("players").delete().eq("id",id); }catch(e){console.warn(e);} }
async function cloudCreateLeague(name,code){ if(!cloudOn())return null; try{ const {data,error}=await sb.from("leagues").insert({owner:user.id,name,join_code:code}).select("*").single(); if(error)throw error; return data; }catch(e){ const msg=(e.message||e)+""; toast(/relation|does not exist|schema|404/i.test(msg)?"Run supabase-setup.sql first — database tables missing.":"Couldn’t create league: "+msg); return null; } }
async function cloudJoinLeague(code){ if(!cloudOn())return null; try{ const {data,error}=await sb.rpc("join_league",{p_code:code}); if(error)throw error; return data; }catch(e){ toast(e.message||"Couldn’t join — check the code."); return null; } }
async function cloudDeleteLeague(id){ if(!cloudOn())return; try{ await sb.from("leagues").delete().eq("id",id); }catch(e){console.warn(e);} }

/* installable PWA: build a manifest + icon at runtime (single-file friendly) */
const ICON_SVG='<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512"><rect width="512" height="512" rx="96" fill="#1b4d3e"/><text x="256" y="312" font-family="Georgia,serif" font-size="300" font-weight="700" text-anchor="middle" fill="#f4eddd">&#9824;</text><circle cx="256" cy="430" r="22" fill="#c99a3b"/></svg>';
function setupPWA(){
  try{
    const icon="data:image/svg+xml;base64,"+btoa(ICON_SVG);
    const man={name:"Dig Pro — Scorepad",short_name:"Dig Pro",description:"Scorepad for Gin card-game nights.",start_url:".",scope:".",display:"standalone",orientation:"portrait",background_color:"#143d30",theme_color:"#1b4d3e",icons:[{src:icon,sizes:"512x512",type:"image/svg+xml",purpose:"any maskable"}]};
    const url=URL.createObjectURL(new Blob([JSON.stringify(man)],{type:"application/manifest+json"}));
    let l=document.querySelector('link[rel="manifest"]'); if(!l){ l=document.createElement("link"); l.rel="manifest"; document.head.appendChild(l);} l.href=url;
    let al=document.querySelector('link[rel="apple-touch-icon"]'); if(!al){ al=document.createElement("link"); al.rel="apple-touch-icon"; document.head.appendChild(al);} al.href=icon;
  }catch(e){}
  window.addEventListener("beforeinstallprompt",e=>{ e.preventDefault(); deferredPrompt=e; const b=document.getElementById("installBtn"); if(b) b.classList.remove("hidden"); });
  window.addEventListener("appinstalled",()=>{ deferredPrompt=null; const b=document.getElementById("installBtn"); if(b) b.classList.add("hidden"); toast("Installed — find Dig Pro on your home screen"); });
}
let deferredPrompt=null;
async function doInstall(){
  if(deferredPrompt){ deferredPrompt.prompt(); try{ await deferredPrompt.userChoice; }catch(e){} deferredPrompt=null; const b=document.getElementById("installBtn"); if(b) b.classList.add("hidden"); return; }
  const iOS=/iphone|ipad|ipod/i.test(navigator.userAgent);

}
function setupConnectivity(){

/* native share with clipboard fallback */
async function shareText(title,text){
  try{ if(navigator.share){ await navigator.share({title,text}); return; } }catch(e){ if(e&&e.name==="AbortError") return; }
  try{ await navigator.clipboard.writeText(text); toast("Copied to clipboard"); }
  catch(e){ toast("Couldn’t share on this device"); }
}
function shareStandings(){
  const rows=standingsRows(); if(!rows.length){ toast("No games yet to share"); return; }
  const where = leagueState.current==="all" ? "All games" : leagueName(leagueState.current);
  let t=`🃏 Dig Pro — ${where} standings\n`;
  rows.forEach((r,i)=>{ t+=`${i+1}. ${r.name} — ${r.pts} pts (${r.wins} win${r.wins===1?"":"s"})\n`; });
  shareText("Dig Pro standings", t.trim());
}
function shareGame(id){
  const g=history.find(x=>x.id===id); if(!g) return;
  const {totals}=finalTotals(g); const order=g.players.map((p,i)=>({n:p.name,t:totals[i]})).sort((a,b)=> rules.winHigh? b.t-a.t : a.t-b.t);
  let t=`🃏 Dig Pro — ${fmtDate(g.date)}\n`;
  if(g.winners&&g.winners.length) t+=`Winner: ${g.winners.join(", ")}\n`;
  order.forEach(o=>{ t+=`${o.n}: ${o.t}\n`; });
  shareText("Dig Pro result", t.trim());
}

/* local backup export / restore (JSON) */
function exportBackup(){
  const data={app:"dig-pro",version:1,exported:new Date().toISOString(),history,leagues:leagueState,rules,players:savedPlayers};
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:"application/json"}));
  a.download=`dig-pro-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  toast("Backup file downloaded");
}
function pickBackup(){ const i=document.getElementById("backupFile"); if(i) i.click(); }
async function restoreBackup(file){
  if(!file) return;
  let data; try{ data=JSON.parse(await file.text()); }catch(e){ toast("That file isn’t a valid backup"); return; }
  if(!data||data.app!=="dig-pro"||!Array.isArray(data.history)){ toast("That file isn’t a Dig Pro backup"); return; }
  if(!await askConfirm({title:"Restore this backup?",body:`This replaces the games, leagues and rules on this device with the backup’s (${data.history.length} game${data.history.length===1?"":"s"}). This can’t be undone.`,confirmText:"Restore",danger:true})) return;
  history=data.history||[]; leagueState=(data.leagues&&data.leagues.leagues)?data.leagues:{leagues:[],current:"all"};
  rules=Object.assign({},DEFAULT_RULES,data.rules||{}); ROUNDS=rules.rounds; savedPlayers=data.players||[];
  saveNow(K_HIST); saveNow(K_LEAGUES); saveNow(K_RULES); saveKey(K_PLAYERS);
  view="history"; setTab("history"); render(); toast("Backup restored");
}

async function init(){
  await ensureSupabase();
  setupPWA(); setupConnectivity();
  rules=Object.assign({},DEFAULT_RULES, await loadKey(K_RULES)||{}); ROUNDS=rules.rounds;
  active=await loadKey(K_ACTIVE);
  if(active && !active.rounds) active.rounds = active.players[0] ? active.scores[active.players[0].id].length : ROUNDS;
  if(active && !active.gins){active.gins={}; active.players.forEach(p=>active.gins[p.id]=Array(active.rounds).fill(false));}
  history=(await loadKey(K_HIST))||[];
  roster=(await loadKey(K_ROSTER))||[];
  const ls=await loadKey(K_LEAGUES); if(ls&&ls.leagues) leagueState=ls;

function addToRoster(name){
  name=(name||"").trim();
  if(!name || /^Player \d+$/i.test(name)) return;
  const lc=name.toLowerCase();
  roster=roster.filter(n=>n.toLowerCase()!==lc);
  roster.unshift(name);
  if(roster.length>40) roster.length=40;
}

function genJoinCode(){const a="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";let s="";for(let i=0;i<5;i++)s+=a[Math.floor(Math.random()*a.length)];return s;}
async function createLeague(){
  const name=await askPrompt({title:"New league or competition", body:"Name it — e.g. “Friday Crew” or “Summer Cup”. Games you play while it’s selected get filed and ranked under it.", placeholder:"League or competition name", confirmText:"Create"});
  if(!name){ render(); return; }
  if(cloudOn()){
    const code=genJoinCode(); const row=await cloudCreateLeague(name,code);
    if(!row){ render(); return; }
    leagueState.leagues.push({id:row.id,name:row.name,code:row.join_code,owner:row.owner});
    leagueState.current=row.id; saveNow(K_LEAGUES); render(); toast(`“${name}” created — share code ${row.join_code}`);
  } else {
    const id="lg_"+Date.now().toString(36);
    leagueState.leagues.push({id,name,createdAt:Date.now()});
    leagueState.current=id; saveNow(K_LEAGUES); render(); toast(`“${name}” created`);
  }
}
async function joinLeaguePrompt(){
  if(!cloudOn()){ toast("Sign in first to join a league by code."); render(); return; }
  const code=await askPrompt({title:"Join a league", body:"Enter the share code from whoever set it up.", placeholder:"e.g. 7KQ2P", confirmText:"Join", maxlen:8, upper:true});
  if(!code){ render(); return; }
  const row=await cloudJoinLeague(code);
  if(!row){ render(); return; }
  if(!leagueState.leagues.some(l=>l.id===row.id)) leagueState.leagues.push({id:row.id,name:row.name,code:row.join_code,owner:row.owner});

async function renameLeague(){
  if(leagueState.current==="all") return;
  const l=leagueState.leagues.find(x=>x.id===leagueState.current); if(!l) return;
  const name=await askPrompt({title:"Rename league", value:l.name, confirmText:"Save"});
  if(name){ l.name=name; saveNow(K_LEAGUES); if(cloudOn()&&l.owner===user.id) sb.from("leagues").update({name}).eq("id",l.id); render(); }
  else render();
}
async function deleteLeague(){
  if(leagueState.current==="all") return;
  const l=leagueState.leagues.find(x=>x.id===leagueState.current); if(!l) return;
  const owned = !cloudOn() || l.owner===user.id;
  if(!await askConfirm({title: owned?"Delete this league?":"Leave this league?", body: owned?`“${l.name}” is removed. Its games are kept but moved to “All games”.`:`You’ll leave “${l.name}” and stop seeing its shared games.`, confirmText: owned?"Delete":"Leave", danger:true})) return;
  if(cloudOn()){
    if(owned){ cloudDeleteLeague(l.id); } else { sb.from("league_members").delete().eq("league_id",l.id).eq("user_id",user.id); }
  }
  history.forEach(g=>{ if(g.leagueId===l.id) g.leagueId=null; });
  leagueState.leagues=leagueState.leagues.filter(x=>x.id!==l.id);

}

function authMsgSet(t){ const el=document.getElementById("authMsg"); if(el) el.textContent=t; }
function validEmail(e){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }
function friendlyAuthError(msg){
  msg=(msg||"")+"";
  if(/invalid login credentials/i.test(msg)) return "Email or password is incorrect.";
  if(/already registered|already been registered|user already/i.test(msg)) return "That email is already registered — try Sign in.";
  if(/invalid api key|jwt|api key/i.test(msg)) return "Sign-in service rejected the app key. The site’s Supabase key may need updating.";
  if(/rate limit|too many/i.test(msg)) return "Too many attempts — wait a minute and try again.";
  if(/password/i.test(msg) && /short|least|weak/i.test(msg)) return "Password is too short — use at least 6 characters.";
  if(/network|fetch|failed to/i.test(msg)) return "Network problem — check your connection and retry.";
  return msg;
}

async function resendConfirm(){

}
async function authSubmit(){
  if(!sb){ authMsgSet("Cloud sign-in isn’t set up on this copy — tap Continue as guest, or add your Supabase keys (README) to enable accounts."); return; }
  const e=(((document.getElementById("authEmail")||{}).value)||"").trim();
  const pass=((document.getElementById("authPass")||{}).value)||"";
  if(!validEmail(e)){ authMsgSet("Enter a valid email address."); return; }
  if(!pass){ authMsgSet("Enter your password."); return; }
  if(authMode==="up" && pass.length<6){ authMsgSet("Use at least 6 characters for your password."); return; }
  const btn=document.getElementById("authGo"); if(btn) btn.disabled=true;
  authMsgSet(authMode==="up"?"Creating your account…":"Signing you in…");
  try{
    if(authMode==="up"){
      const {data,error}=await sb.auth.signUp({email:e,password:pass,options:{emailRedirectTo:location.href.split("#")[0]}});
      if(error) throw error;
      if(data.user && Array.isArray(data.user.identities) && data.user.identities.length===0){
        authMode="in"; pendingConfirmEmail=""; render(); authMsgSet("That email is already registered — sign in below."); return;
      }
      if(!data.session){ pendingConfirmEmail=e; render(); authMsgSet("Account created! Check your email to confirm, then sign in. Didn’t get it? Resend below."); return; }
      onAuthSuccess(); return;
    } else {
      const {data,error}=await sb.auth.signInWithPassword({email:e,password:pass});
      if(error){
        if(/email not confirmed|not confirmed/i.test(error.message)){ pendingConfirmEmail=e; render(); authMsgSet("Your email isn’t confirmed yet — check your inbox, or resend below."); return; }
        authMsgSet(friendlyAuthError(error.message)); return;
      }
      onAuthSuccess(); return;
    }
  }catch(err){ authMsgSet(friendlyAuthError(err.message||"Something went wrong.")); }
  finally{ const b=document.getElementById("authGo"); if(b) b.disabled=false; }
}

function wireRules(){

/* ---------- the GIN penalty rule ----------
   order = [{key, gins:[bool x ROUNDS]}] in seating order.
   A run of consecutive gins by ONE player (only ANOTHER player's gin breaks the
   run; an ordinary round does not) penalizes the player seated BEFORE them
   (previous seat, wrapping). Penalties STACK as the run grows:
     3rd in a row -> 100, then 50, 50, 100, 50, 50, 100 … for each further gin. */
function ginIncrement(n){            // penalty added the moment a run reaches length n
  if(!rules.ginEnabled) return 0;
  if(n<rules.ginStreak) return 0;
  if(n===rules.ginStreak) return rules.ginFirst;      // the trigger gin
  if(!rules.ginStack) return 0;                        // stacking off → only the trigger
  return ((n-(rules.ginStreak+1))%3===2) ? rules.ginStepBig : rules.ginStepSmall; // …small,small,big repeating
}
function calcPenalties(order){
  const R = order.reduce((m,o)=>Math.max(m,(o.gins||[]).length),0);
  const pen={}; order.forEach(o=>pen[o.key]=0);
  const events=[];
  let streakKey=null, streak=0;
  for(let r=0;r<R;r++){
    const ginners=order.filter(o=>o.gins&&o.gins[r]).map(o=>o.key);
    if(ginners.length===0) continue;            // no gin this round -> run survives
    if(ginners.length===1){
      const g=ginners[0];
      if(g===streakKey){ streak++; } else { streakKey=g; streak=1; }
      const inc=ginIncrement(streak);
      if(inc>0){
        const idx=order.findIndex(o=>o.key===g);
        const victim=order[(idx-1+order.length)%order.length].key;
        pen[victim]-=inc;
        events.push({round:r, ginner:g, victim, amount:inc, streak});
      }
    } else { streakKey=null; streak=0; }         // two gins same round -> reset
  }
  return {pen,events};
}
function ord(n){const s=["th","st","nd","rd"],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}

/* ---------- rule-aware scoring helpers ---------- */
function gR(g){ return g.rounds || (g.players[0]?g.players[0].rounds.length:ROUNDS); }
function bestOf(tots){ return rules.winHigh?Math.max(...tots):Math.min(...tots); }   // winner's score
function worstOf(tots){ return rules.winHigh?Math.min(...tots):Math.max(...tots); }  // bottom's score
/* End-of-game 1000 rule: any player finishing ABOVE the threshold docks the player
   seated before them (turn order, wrapping). Returns per-seat deductions. */
function milestonePenalties(tots){
  const n=tots.length, pen=new Array(n).fill(0);
  if(!rules.milestoneEnabled) return pen;
  for(let i=0;i<n;i++){ if(tots[i]>rules.milestoneThreshold) pen[(i-1+n)%n]-=rules.milestonePenalty; }
  return pen;
}
/* Totals for a FINISHED game = round sums + gin penalties + 1000-rule penalties. */
function finalTotals(g){
  const order=g.players.map((p,i)=>({key:i,gins:p.gins||Array(p.rounds.length).fill(false)}));
  const {pen,events}=calcPenalties(order);
  const afterGin=g.players.map((p,i)=>sumRounds(p.rounds)+(pen[i]||0));
  const mpen=milestonePenalties(afterGin);
  const totals=afterGin.map((t,i)=>t+mpen[i]);
  const mevents=[]; if(rules.milestoneEnabled){ g.players.forEach((p,i)=>{ if(afterGin[i]>rules.milestoneThreshold){ const before=(i-1+g.players.length)%g.players.length; mevents.push({passer:i,victim:before}); } }); }
  return {pen,events,mpen,mevents,totals};
}

/* ---------- live game ---------- */
function baseTotal(pid){return active.scores[pid].reduce((a,v)=>a+(v||0),0);}
function netTotal(pid){return baseTotal(pid)+(curPen.pen[pid]||0);}
function nameOf(pid){const p=active.players.find(x=>x.id===pid);return p?p.name:"";}
function anyScored(){return active.players.some(p=>active.scores[p.id].some(v=>v!==null));}
function leadSet(){
  if(!anyScored()) return new Set();           // no crown before any score is entered
  const tots=active.players.map(p=>netTotal(p.id)); const best=bestOf(tots);
  return new Set(active.players.filter(p=>netTotal(p.id)===best).map(p=>p.id));
}
function roundsPlayed(){
  let n=0; for(let r=0;r<active.rounds;r++){ if(active.players.some(p=>active.scores[p.id][r]!==null||active.gins[p.id][r])) n++; } return n;
}

/* ---------- live spectating ---------- */
function liveSnapshot(){
  const pen=calcPenalties(active.players.map(p=>({key:p.id,gins:active.gins[p.id]})));
  curPen=pen;
  const tots=active.players.map(p=>baseTotal(p.id)+(pen.pen[p.id]||0));
  const best=anyScored()?bestOf(tots):null;
  return {
    rounds:active.rounds,
    players:active.players.map(p=>({name:p.name,suit:p.suit})),
    cells:active.players.map(p=>active.scores[p.id].slice()),
    gins:active.players.map(p=>active.gins[p.id].slice()),
    totals:tots, pens:active.players.map(p=>pen.pen[p.id]||0),
    leadIdx:best===null?[]:tots.map((t,i)=>t===best?i:-1).filter(i=>i>=0),
    events:pen.events.map(e=>({ginner:nameOf(e.ginner),victim:nameOf(e.victim),streak:e.streak,round:e.round,amount:e.amount})),
    played:roundsPlayed(), winHigh:rules.winHigh, updatedAt:Date.now()
  };
}
function countViewers(ch){ try{ const st=ch.presenceState(); let n=0; Object.values(st).forEach(arr=>arr.forEach(m=>{ if(m.role==="viewer") n++; })); return n; }catch(e){ return 0; } }
function viewerLabel(){ return liveViewers>0 ? `👁 ${liveViewers} watching` : "👁 0 watching"; }
function setViewerBadge(){ const e=document.getElementById("liveViewers"); if(e) e.textContent=viewerLabel(); const w=document.getElementById("watchViewers"); if(w) w.textContent=viewerLabel(); }
function openHostChannel(id){
  if(!sb) return;
  if(hostChannel){ try{ sb.removeChannel(hostChannel); }catch(e){} hostChannel=null; }
  hostChannel=sb.channel("live_"+id,{config:{presence:{key:(user&&user.id)||"host"}}});
  hostChannel.on("presence",{event:"sync"},()=>{ liveViewers=countViewers(hostChannel); setViewerBadge(); });
  hostChannel.subscribe(async status=>{ if(status==="SUBSCRIBED"){ try{ await hostChannel.track({role:"host"}); }catch(e){} } });
}
function saveActive(){ saveKey(K_ACTIVE); pushLive(); }
function pushLive(){
  if(!liveState.on||!cloudOn()) return;

  _pushT=setTimeout(async()=>{ try{ await sb.from("live_games").update({data:liveSnapshot(),updated_at:new Date().toISOString()}).eq("id",liveState.id); }catch(e){} },500);

async function goLive(){
  if(!cloudOn()){ toast("Sign in to share a live game."); return; }
  if(liveState.on){ shareLiveCode(); return; }
  const code=genJoinCode();
  try{
    const {data,error}=await sb.from("live_games").insert({host:user.id,code,data:liveSnapshot(),active:true}).select("id,code").single();
    if(error) throw error;
    liveState={on:true,id:data.id,code:data.code}; liveViewers=0;
    if(active){ active.liveId=data.id; active.liveCode=data.code; saveKey(K_ACTIVE); }
    openHostChannel(data.id);
    render(); toast("You’re live — share code "+data.code);
  }catch(e){ toast("Couldn’t start live: "+(e.message||e)); }
}
async function stopLive(silent){
  if(!liveState.on) return;

  if(hostChannel){ try{ sb.removeChannel(hostChannel); }catch(e){} hostChannel=null; }
  liveState={on:false,id:null,code:null}; liveViewers=0;
  if(active){ delete active.liveId; delete active.liveCode; saveKey(K_ACTIVE); }

}

function startWatching(row){

  return `Tap <b>gin</b> when a player goes gin. <b>${rules.ginStreak}</b> in a row docks the player seated before them <b>${rules.ginFirst}</b>${stack}.`;
}
function updateSign(btn,inp){if(!btn)return;const neg=inp.value.trim().startsWith("-");btn.classList.toggle("neg",neg);btn.textContent=neg?"−":"±";}
function wireGame(){
  document.querySelectorAll(".ci").forEach(inp=>{
    inp.oninput=()=>{
      let raw=inp.value.replace(/[^0-9-]/g,"").replace(/(?!^)-/g,"");  // digits + one leading minus
      if(raw!==inp.value) inp.value=raw;
      const pid=inp.dataset.pid, r=+inp.dataset.r;
      active.scores[pid][r]= (raw===""||raw==="-") ? null : parseInt(raw,10);
      updateSign(inp.closest("td.cell").querySelector("[data-sign]"),inp);
      saveActive(); refreshTotals(pid);   // scores never change penalties
    };
  });
  document.querySelectorAll("[data-sign]").forEach(btn=>{
    btn.onclick=()=>{
      const pid=btn.dataset.pid, r=+btn.dataset.r;
      const inp=btn.closest("td.cell").querySelector(".ci");
      const cur=active.scores[pid][r];
      if(cur===null){                                   // empty: prime a minus to type into
        inp.value = inp.value.trim().startsWith("-") ? "" : "-";
        inp.focus();
      } else {                                          // has a value: flip its sign
        active.scores[pid][r]=-cur; inp.value=String(-cur);
        saveActive(); refreshTotals(pid);
      }
      updateSign(btn,inp);
    };
  });
  document.querySelectorAll("[data-gin]").forEach(btn=>{
    btn.onclick=()=>{
      const pid=btn.dataset.pid, r=+btn.dataset.r;
      active.gins[pid][r]=!active.gins[pid][r];
      saveActive(); render();  // gin flags DO change penalties -> full render
    };
  });
  document.getElementById("finishBtn").onclick=finishGame;
  document.getElementById("cancelBtn").onclick=async()=>{
    if(await askConfirm({title:"Discard this game?", body:"It won’t be saved or counted anywhere. This can’t be undone.", confirmText:"Discard", danger:true})){
      await stopLive(true); active=null; delKey(K_ACTIVE); render();
    }
  };
  const gl=document.getElementById("goLiveBtn"); if(gl) gl.onclick=goLive;
  const sl=document.getElementById("stopLiveBtn"); if(sl) sl.onclick=()=>stopLive();
  const shl=document.getElementById("shareLiveBtn"); if(shl) shl.onclick=shareLiveCode;
}
function refreshTotals(changedPid){
  const lead=leadSet();
  active.players.forEach(p=>{
    const t=netTotal(p.id);
    const totEl=document.querySelector(`[data-tot="${p.id}"]`);
    if(totEl){ if(totEl.textContent!=String(t)&&p.id===changedPid){totEl.classList.remove("bump");void totEl.offsetWidth;totEl.classList.add("bump");} totEl.textContent=t; }
    const L=lead.has(p.id);
    document.querySelectorAll(`.pcol[data-col="${p.id}"],td.cell[data-col="${p.id}"]`).forEach(el=>el.classList.toggle("lead",L));
  });
  const played=roundsPlayed(), done=played>=active.rounds;
  const rl=document.querySelector(".roundlbl b"); if(rl) rl.textContent=Math.min(played+(done?0:1),active.rounds);
  const fb=document.getElementById("finishBtn"); if(fb) fb.classList.toggle("ready",done);
}
async function finishGame(){
  const played=roundsPlayed();
  const body = played>=active.rounds ? "Tally the final scores and record this game?"
    : played===0 ? "No scores are entered yet — record it anyway?"
    : `Only ${played} of ${active.rounds} rounds are filled in. Finish and record it now?`;
  if(await askConfirm({title:"Finish game?", body, confirmText:"Finish"})) doFinishGame();
}
function doFinishGame(){
  const rec={id:"g_"+Date.now(),date:Date.now(),leagueId: active.leagueId||null, rounds:active.rounds,
    players:active.players.map(p=>({name:p.name,suit:p.suit,rounds:active.scores[p.id].slice(),gins:active.gins[p.id].slice()})),
    winners:[]};
  const {totals}=finalTotals(rec); const best=bestOf(totals);
  rec.winners=rec.players.filter((p,i)=>totals[i]===best).map(p=>p.name);
  history.unshift(rec); saveNow(K_HIST); cloudSaveGame(rec); buzz(40); toast("Game saved"); celebrate();
  stopLive(true);
  active=null; delKey(K_ACTIVE);
  draft=[{name:"",suit:0},{name:"",suit:1},{name:"",suit:2},{name:"",suit:3}];
  view="history"; setTab("history"); render();
}

/* ---------- history ---------- */
function sumRounds(rs){return rs.reduce((a,v)=>a+(v||0),0);}
function historyHTML(){
  const all=gamesInLeague();
  if(!all.length){
    const where = leagueState.current==="all" ? "Finish a game in This Game and the full ten-round scorepad lands here." : `No games in “${esc(leagueName(leagueState.current))}” yet. Start a game while this league is selected and it’ll show up here.`;
    return emptyHTML("♠", leagueState.current==="all"?"No games yet":"No games in this league", where);
  }
  return `<div class="histsearch"><input id="histSearch" type="search" placeholder="Search by player name…" value="${esc(historyQuery)}" oninput="onHistorySearch(this.value)" autocomplete="off"/></div><div id="histList">${historyListHTML()}</div>`;
}
function onHistorySearch(v){ historyQuery=v; const l=document.getElementById("histList"); if(l) l.innerHTML=historyListHTML(); }
function historyListHTML(){
  let games=gamesInLeague();
  const q=historyQuery.trim().toLowerCase();
  if(q) games=games.filter(g=>g.players.some(p=>(p.name||"").toLowerCase().includes(q)));
  if(!games.length) return `<div class="empty" style="padding:30px 10px"><p>No games match “${esc(historyQuery)}”.</p></div>`;
  return games.map(g=>{
    const {pen,events,mpen,mevents,totals}=finalTotals(g);
    const best=bestOf(totals), worst=worstOf(totals);
    const hasBottom=rules.bottomTitles && totals.some(t=>t!==best);
    const losers=g.players.filter((p,i)=>totals[i]===worst).map(p=>p.name);
    const deep=worst<0;
    const champ=g.winners.length>1?`Tie — ${g.winners.join(" & ")}`:`${g.winners[0]} wins`;
    const botLabel=`${deep?"Deep Bottom":"Bottom"}: ${losers.join(" & ")}`;
    const head=g.players.map((p,i)=>{const s=SUITS[p.suit],w=totals[i]===best,b=hasBottom&&totals[i]===worst;
      return `<th class="${w?"wcol":""}${b?" bcol":""}"><span class="su" style="${s.k==='red'?'color:var(--red)':'color:rgba(244,237,221,.9)'}">${s.c}</span>${esc(p.name)}</th>`;}).join("");
    let rows="";
    for(let r=0;r<gR(g);r++){
      rows+=`<tr><td class="rg">${r+1}</td>${g.players.map(p=>{const v=p.rounds[r],gin=p.gins&&p.gins[r];
        return `<td class="v ${(!v?"zero":"")} ${gin?"gin":""}">${v===null||v===undefined?"·":v}</td>`;}).join("")}</tr>`;
    }
    const penrow = Object.values(pen).some(x=>x) ? `<tr class="penrow"><td class="rg">−</td>${g.players.map((p,i)=>`<td>${pen[i]?("−"+Math.abs(pen[i])):""}</td>`).join("")}</tr>` : "";
    const mrow = mpen.some(x=>x) ? `<tr class="penrow mrow"><td class="rg">▲</td>${g.players.map((p,i)=>`<td>${mpen[i]?("−"+Math.abs(mpen[i])):""}</td>`).join("")}</tr>` : "";
    const foot=g.players.map((p,i)=>`<td class="${totals[i]===best?"wcol":""}${hasBottom&&totals[i]===worst?" bcol":""}">${totals[i]}</td>`).join("");
    const evGin = events.map(e=>`<div class="ev">♛ <b>${esc(g.players[e.ginner].name)}</b> ${ord(e.streak)} gin in a row → <span class="v">${esc(g.players[e.victim].name)} −${e.amount}</span></div>`).join("");
    const evMile = mevents.map(e=>`<div class="ev">▲ <b>${esc(g.players[e.passer].name)}</b> finished over ${rules.milestoneThreshold} → <span class="v">${esc(g.players[e.victim].name)} −${rules.milestonePenalty}</span></div>`).join("");
    const evline = (evGin||evMile)? `<div class="pensum" style="margin-top:10px">${evGin}${evMile}</div>`:"";
    return `<div class="game">
      <div class="top">
        <div class="titles"><span class="champ">♛ ${esc(champ)}</span>${hasBottom?`<span class="bottom${deep?" deep":""}">▼ ${esc(botLabel)}</span>`:""}</div>
        <span class="when">${fmtDate(g.date)}${leagueState.current==="all"&&g.leagueId&&leagueName(g.leagueId)?`<span class="lgtag">${esc(leagueName(g.leagueId))}</span>`:""}<button class="sharebtn" title="Rematch — same players" onclick="rematch('${g.id}')">↻</button><button class="sharebtn" title="Share result" onclick="shareGame('${g.id}')">⤴</button></span>
      </div>
      <div class="mini"><table class="mtbl">
        <thead><tr><th class="rg">Rd</th>${head}</tr></thead>
        <tbody>${rows}</tbody>
        <tfoot>${penrow}${mrow}<tr><td class="rg">Σ</td>${foot}</tr></tfoot>
      </table></div>${evline}
    </div>`;
  }).join("");
}

/* ---------- leaderboard ---------- */
function standingsRows(){
  const games=gamesInLeague(); const tbl={};
  games.forEach(g=>{ const {totals}=finalTotals(g); const best=bestOf(totals); const winLC=g.winners.map(w=>w.toLowerCase());
    g.players.forEach((p,i)=>{ const k=p.name.toLowerCase(); const t=tbl[k]||(tbl[k]={name:p.name,pts:0,wins:0,games:0});
      t.games++; t.pts+=totals[i]; if(totals[i]===best && winLC.includes(k)) t.wins++; }); });
  return Object.values(tbl).map(t=>({...t,pts:Math.round(t.pts)})).sort((a,b)=>b.wins-a.wins||b.pts-a.pts);
}
function leaderboardHTML(){
  const games=gamesInLeague();
  if(!games.length) return emptyHTML("♛", leagueState.current==="all"?"No standings yet":"No standings in this league", leagueState.current==="all"?"Play a few games and everyone gets ranked here by wins, win rate and total score.":`Play some games under “${esc(leagueName(leagueState.current))}” and its table builds here.`);
  const tbl={};
  games.forEach(g=>{
    const {totals}=finalTotals(g);
    const best=bestOf(totals), worst=worstOf(totals), hasBottom=rules.bottomTitles && totals.some(t=>t!==best);
    const winLC=g.winners.map(w=>w.toLowerCase());
    g.players.forEach((p,i)=>{
      const key=p.name.toLowerCase();
      const t=tbl[key]||(tbl[key]={name:p.name,suit:p.suit,games:0,wins:0,total:0,bestRound:0,gins:0,bottoms:0,deepBottoms:0});
      t.games++; t.total+=totals[i];
      const br=Math.max(0,...p.rounds.map(v=>v||0)); t.bestRound=Math.max(t.bestRound,br);
      if(p.gins) t.gins+=p.gins.filter(Boolean).length;
      if(totals[i]===best && winLC.includes(key)) t.wins++;
      if(hasBottom && totals[i]===worst){ t.bottoms++; if(worst<0) t.deepBottoms++; }
    });
  });
  const rows=Object.values(tbl).map(t=>({...t,rate:t.games?t.wins/t.games:0}))
    .sort((a,b)=>b.wins-a.wins||b.total-a.total||b.rate-a.rate);
  return `<div class="lbtools"><button class="sharebtn" onclick="view='stats';render()">📊 Head-to-head &amp; streaks</button><button class="sharebtn wide" onclick="shareStandings()">⤴ Share standings</button></div><table class="lb"><thead><tr>
      <th class="rank">#</th><th>Player</th><th>Wins</th>
      <th class="hide-sm">Games</th><th>Win&nbsp;%</th><th>Total</th><th class="hide-sm">Gins</th><th class="hide-sm">Bottom</th>
    </tr></thead><tbody>${rows.map((t,i)=>{const s=SUITS[t.suit];
      return `<tr class="${i===0?"first":""}">
        <td class="rank"><span class="rk">${i+1}</span></td>
        <td><span class="player"><span class="su" style="${s.k==='red'?'color:var(--red)':'color:var(--brass-soft)'}">${s.c}</span><span class="nm">${esc(t.name)}</span></span></td>
        <td><span class="wins">${t.wins}</span></td>
        <td class="dim hide-sm">${t.games}</td>
        <td class="dim">${Math.round(t.rate*100)}%</td>
        <td class="dim total">${t.total}</td>
        <td class="dim hide-sm">${t.gins}</td>
        <td class="dim hide-sm">${t.bottoms}${t.deepBottoms?` <span style="color:#e6857f;font-size:11px">·${t.deepBottoms} deep</span>`:""}</td>
      </tr>`;}).join("")}</tbody></table>`;
}

/* ---------- stats (head-to-head + streaks) ---------- */
function maxRun(arr){ let m=0,c=0; (arr||[]).forEach(v=>{ if(v){c++; if(c>m)m=c;} else c=0; }); return m; }
function statsData(){
  const games=gamesInLeague(); const players={}; const h2h={};
  games.forEach(g=>{
    const {totals}=finalTotals(g); const best=bestOf(totals); const winLC=g.winners.map(w=>w.toLowerCase());
    g.players.forEach((p,i)=>{
      const k=p.name.toLowerCase();
      const s=players[k]||(players[k]={name:p.name,suit:p.suit,games:0,wins:0,pts:0,gins:0,streak:0,best:null});
      s.games++; s.pts+=totals[i];
      if(p.gins){ s.gins+=p.gins.filter(Boolean).length; s.streak=Math.max(s.streak,maxRun(p.gins)); }
      if(totals[i]===best && winLC.includes(k)) s.wins++;
      if(s.best===null || (rules.winHigh?totals[i]>s.best:totals[i]<s.best)) s.best=totals[i];
    });
    for(let i=0;i<g.players.length;i++) for(let j=i+1;j<g.players.length;j++){
      const ni=g.players[i].name, nj=g.players[j].name, ki=ni.toLowerCase(), kj=nj.toLowerCase();
      const aFirst=ki<=kj; const key=aFirst?ki+"|"+kj:kj+"|"+ki;
      const A=aFirst?ni:nj, B=aFirst?nj:ni, ta=aFirst?totals[i]:totals[j], tb=aFirst?totals[j]:totals[i];
      const rec=h2h[key]||(h2h[key]={a:A,b:B,aw:0,bw:0,draw:0,games:0}); rec.games++;
      const cmp=rules.winHigh?(ta-tb):(tb-ta);
      if(cmp>0) rec.aw++; else if(cmp<0) rec.bw++; else rec.draw++;
    }
  });
  return { players:Object.values(players).sort((a,b)=>b.wins-a.wins||b.pts-a.pts),
           h2h:Object.values(h2h).sort((a,b)=>b.games-a.games), totalGames:games.length };
}
function statsHTML(){
  const where=leagueState.current==="all"?"All games":esc(leagueName(leagueState.current));
  const head=`<div class="ruleshead"><h2>Stats</h2><button class="btn btn-ghost" id="statsBack">Back</button></div>`;
  const d=statsData();
  if(!d.totalGames) return `<div class="panel">${head}<p class="sub">No games yet${leagueState.current==="all"?"":` in “${where}”`} — play some and the head-to-head records and gin streaks build here.</p></div>`;
  const prows=d.players.map(s=>{const su=SUITS[s.suit]||SUITS[0];
    return `<tr><td><span class="player"><span class="su" style="${su.k==='red'?'color:var(--red)':'color:var(--brass-soft)'}">${su.c}</span><span class="nm">${esc(s.name)}</span></span></td>
      <td class="dim">${s.games}</td><td><span class="wins">${s.wins}</span></td>
      <td class="dim total">${Math.round(s.pts)}</td><td class="dim">${s.gins}</td>
      <td><b style="color:var(--brass-soft)">${s.streak}</b></td><td class="dim">${s.best==null?"·":s.best}</td></tr>`;}).join("");
  const h2hrows=d.h2h.map(r=>{
    const lead = r.aw>r.bw?"a":r.bw>r.aw?"b":"";
    return `<div class="h2hrow"><span class="h2hp ${lead==='a'?'win':''}">${esc(r.a)}</span><span class="h2hscore">${r.aw}<span class="dash">–</span>${r.bw}${r.draw?` <span class="drw">(${r.draw}d)</span>`:""}</span><span class="h2hp r ${lead==='b'?'win':''}">${esc(r.b)}</span></div>`;
  }).join("");
  return `<div class="panel">${head}
    <p class="sub">${where} · ${d.totalGames} game${d.totalGames>1?"s":""}.</p>
    <div class="statshd">Players</div>
    <div class="sheet"><table class="lb statstbl"><thead><tr><th>Player</th><th class="dim">G</th><th>Wins</th><th class="dim">Total</th><th class="dim">Gins</th><th>Streak</th><th class="dim">Best</th></tr></thead><tbody>${prows}</tbody></table></div>
    ${d.h2h.length?`<div class="statshd">Head-to-head</div><div class="h2hbox">${h2hrows}</div>`:""}
    <p class="rnote" style="margin-top:14px">“Streak” is the longest run of consecutive gins in one game. Head-to-head counts who finished ahead when two players shared a game.</p>
  </div>`;
}
function emptyHTML(icon,title,body){return `<div class="empty"><div class="big">${icon}</div><strong>${title}</strong><p>${body}</p></div>`;}
function fmtDate(ts){const d=new Date(ts),now=new Date();const t=d.toLocaleTimeString([],{hour:"numeric",minute:"2-digit"});
  if(d.toDateString()===now.toDateString())return "Today · "+t;
  return d.toLocaleDateString([],{month:"short",day:"numeric"})+" · "+t;}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function askConfirm({title,body,confirmText="Confirm",danger=false}){
  return new Promise(resolve=>{
    const wrap=document.createElement("div"); wrap.className="modal";
    wrap.innerHTML=`<div class="mcard"><h3>${esc(title)}</h3>${body?`<p>${esc(body)}</p>`:""}<div class="mbtns"><button class="btn btn-ghost" data-no>Cancel</button><button class="btn ${danger?"btn-danger":"btn-primary"}" data-yes>${esc(confirmText)}</button></div></div>`;
    document.body.appendChild(wrap);
    const close=v=>{ wrap.remove(); resolve(v); };
    wrap.querySelector("[data-yes]").onclick=()=>close(true);
    wrap.querySelector("[data-no]").onclick=()=>close(false);
    wrap.onclick=e=>{ if(e.target===wrap) close(false); };
  });
}
function askPrompt({title,body,placeholder="",value="",confirmText="OK",maxlen=40,upper=false}){
  return new Promise(resolve=>{
    const wrap=document.createElement("div"); wrap.className="modal";
    wrap.innerHTML=`<div class="mcard"><h3>${esc(title)}</h3>${body?`<p>${esc(body)}</p>`:""}<div class="authfields"><input type="text" id="promptInput" maxlength="${maxlen}" placeholder="${esc(placeholder)}" value="${esc(value)}" autocomplete="off" ${upper?'style="text-transform:uppercase"':''}/></div><div class="mbtns"><button class="btn btn-ghost" data-no>Cancel</button><button class="btn btn-primary" data-yes>${esc(confirmText)}</button></div></div>`;
    document.body.appendChild(wrap);
    const inp=wrap.querySelector("#promptInput");
    const close=v=>{ wrap.remove(); resolve(v); };
    const done=()=>{ const v=(inp.value||"").trim(); close(v||null); };
    wrap.querySelector("[data-yes]").onclick=done;
    wrap.querySelector("[data-no]").onclick=()=>close(null);
    wrap.onclick=e=>{ if(e.target===wrap) close(null); };
    inp.onkeydown=e=>{ if(e.key==="Enter") done(); else if(e.key==="Escape") close(null); };
    setTimeout(()=>{ inp.focus(); inp.select(); },60);
  });
}
